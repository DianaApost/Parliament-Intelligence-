name: Daily Parliamentary Summary
on:
  schedule:
    - cron: '0 13 * * *' # Runs at 8:00 AM EST every day
  workflow_dispatch: # This is the magic line that adds the "Run" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run summary script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python parliament_summary.py
