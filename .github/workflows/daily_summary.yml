name: Daily Parliamentary Summary
on:
  schedule:
    - cron: '0 13 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run summary script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python parliament_summary.py

      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Daily Parliament Briefing: Labour & Skills"
          to: ${{ secrets.DESTINATION_EMAIL }}
          from: "Parliament Bot"
         subject: "Daily Parliament Briefing: Labour & Skills"
          to: ${{ secrets.DESTINATION_EMAIL }}
          from: "Parliament Bot"
          # This version is cleaner:
          html_body: file://summary.txt
